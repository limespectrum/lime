<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход — ФАРМ BP</title>
<link rel="icon" type="image/png" href="https://psv4.userapi.com/s/v1/d2/OS1XuRQbrcwb45XOpQZ3lzZEOnFKmLQhQ-QIga0mxOtLC5nKBS-kWnJ4x13j3wIbtya2vNiAuhxKZg_F5n4RcOzLh3SCJCCNgw4scYil3cy3L8SN2IfuZDqEepVggECnhAAh-t7wuWh8/LIME_COIN.png">
<style>
  *, *::before, *::after {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
  }
  input, textarea {
    user-select: text;
    -webkit-user-select: text;
    -moz-user-select: text;
  }
  * { cursor: default; box-sizing: border-box; }
  button, .auth-submit, .tab-btn, .forgot-link { cursor: pointer; }
  input, textarea { cursor: text; }

  html, body {
    margin: 0;
    height: 100%;
    background: #050d1a;
    font-family: system-ui, -apple-system, Roboto, Arial, sans-serif;
    color: #e5e7eb;
  }

  #pinOverlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #050d1a;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: all;
  }
  .pin-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,255,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(180,0,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,200,0,0.04) 0%, transparent 70%);
    animation: bgShift 6s ease-in-out infinite alternate;
    pointer-events: all;
  }
  @keyframes bgShift {
    0%   { opacity: 0.7; }
    100% { opacity: 1; }
  }
  .pin-box {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
    padding: 44px 40px 40px;
    border-radius: 24px;
    background: rgba(5, 14, 30, 0.95);
    border: 1.5px solid rgba(0,255,255,0.25);
    box-shadow:
      0 0 0 1px rgba(0,255,255,0.15),
      0 0 40px rgba(0,255,255,0.18),
      0 0 80px rgba(180,0,255,0.12),
      0 0 120px rgba(255,200,0,0.06),
      inset 0 1px 0 rgba(255,255,255,0.06);
    width: min(92vw, 400px);
    box-sizing: border-box;
  }
  .pin-loader {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 3px solid rgba(0,255,255,0.18);
    border-top-color: rgba(0,220,255,0.85);
    animation: pinSpin 0.9s linear infinite;
  }
  @keyframes pinSpin {
    to { transform: rotate(360deg); }
  }
  .pin-title {
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #00eeff, #cc44ff, #ffdd00);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 10px rgba(0,220,255,0.6));
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
    text-align: center;
  }
  .pin-sub {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(150,210,255,0.45);
    margin-top: -6px;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
    text-align: center;
  }
  .pin-error, .pin-success {
    font-size: 0.8rem; font-weight: 700; letter-spacing: 1px;
    min-height: 20px;
    text-transform: uppercase;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
    text-align: center;
  }
  .pin-error {
    color: #ff4444;
    text-shadow: 0 0 8px rgba(255,60,60,0.7);
  }
  .pin-success {
    color: #55e6a5;
    text-shadow: 0 0 8px rgba(80,230,160,0.6);
  }

  /* Переключатель ВОЙТИ / РЕГИСТРАЦИЯ */
  .tab-switch {
    display: flex;
    width: 100%;
    background: rgba(0,20,45,0.6);
    border: 1.5px solid rgba(0,255,255,0.18);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 2px;
  }
  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    color: rgba(150,210,255,0.55);
    font-family: monospace;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 6px;
    border-radius: 8px;
    transition: all 0.15s ease;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, rgba(0,238,255,0.18), rgba(204,68,255,0.18));
    color: #fff;
    box-shadow: 0 0 10px rgba(0,255,255,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .auth-form {
    display: flex; flex-direction: column; gap: 14px;
    width: 100%; margin: 4px 0 0;
  }
  .auth-input {
    width: 100%;
    box-sizing: border-box;
    height: 54px;
    padding: 0 16px;
    font-size: 0.95rem; font-weight: 700; font-family: monospace;
    letter-spacing: 1px;
    border-radius: 12px;
    background: rgba(0,20,45,0.85);
    border: 2px solid rgba(0,255,255,0.2);
    color: #00eeff;
    text-shadow: 0 0 8px rgba(0,220,255,0.5);
    box-shadow: inset 0 0 12px rgba(0,255,255,0.06);
    transition: all 0.15s ease;
    outline: none;
  }
  .auth-input::placeholder {
    color: rgba(150,210,255,0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .auth-input:focus {
    border-color: rgba(0,255,255,0.55);
    color: #fff;
    text-shadow: 0 0 14px rgba(0,220,255,0.9);
    box-shadow: inset 0 0 16px rgba(0,255,255,0.12), 0 0 12px rgba(0,200,255,0.25);
  }
  .auth-input.error {
    border-color: rgba(255,60,60,0.8) !important;
    animation: shake 0.4s ease;
  }
  .auth-submit {
    width: 100%;
    height: 54px;
    border-radius: 14px;
    border: 1.5px solid rgba(0,255,255,0.3);
    background: linear-gradient(135deg, rgba(0,238,255,0.18), rgba(204,68,255,0.18));
    color: #fff;
    font-size: 0.95rem; font-weight: 900; font-family: monospace;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .auth-submit:hover {
    background: linear-gradient(135deg, rgba(0,238,255,0.3), rgba(204,68,255,0.3));
    border-color: rgba(0,255,255,0.6);
    box-shadow: 0 0 14px rgba(0,255,255,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
    transform: translateY(-2px);
  }
  .auth-submit:active {
    transform: scale(0.97);
  }
  .auth-submit:disabled {
    opacity: 0.5;
    cursor: default;
    transform: none;
  }
  .forgot-link {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(150,210,255,0.55);
    margin-top: -4px;
    transition: color 0.15s ease;
  }
  .forgot-link:hover { color: rgba(0,220,255,0.9); }
  .field-hint {
    font-size: 0.66rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(150,210,255,0.35);
    text-align: center;
    margin-top: -8px;
    text-transform: none;
  }
  @keyframes shake {
    0%,100%{ transform: translateX(0); }
    20%    { transform: translateX(-8px); }
    40%    { transform: translateX(8px); }
    60%    { transform: translateX(-6px); }
    80%    { transform: translateX(6px); }
  }

  /* Обёртка поля пароля с глазиком (показать/скрыть) */
  .pass-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }
  .pass-wrapper .auth-input {
    padding-right: 46px;
  }
  .pass-toggle {
    position: absolute;
    right: 14px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: rgba(150,210,255,0.45);
    display: flex;
    align-items: center;
    transition: color 0.18s;
  }
  .pass-toggle:hover { color: rgba(0,220,255,0.85); }
</style>
</head>
<body>

<div id="pinOverlay">
  <div class="pin-bg"></div>

  <div class="pin-box" id="loadingBox">
    <div class="pin-loader"></div>
    <div class="pin-sub">ЗАГРУЗКА...</div>
  </div>

  <div class="pin-box" id="authBox" style="display:none;">
    <div class="pin-title">⬡ ФАРМ BP ⬡</div>
    <div class="pin-sub" id="authSubLabel">ВХОД В СИСТЕМУ</div>

    <!-- Переключатель вкладок (только для входа/регистрации) -->
    <div class="tab-switch" id="tabSwitch">
      <button type="button" class="tab-btn active" id="tabBtnLogin" onclick="switchView('login')">Войти в аккаунт</button>
      <button type="button" class="tab-btn" id="tabBtnRegister" onclick="switchView('register')">Создать аккаунт</button>
    </div>

    <!-- ВОЙТИ В АККАУНТ -->
    <div class="auth-form" id="loginForm">
      <input type="text" id="loginIdentInput" class="auth-input" placeholder="ЛОГИН ИЛИ ПОЧТА" autocomplete="username">
      <div class="pass-wrapper">
        <input type="password" id="loginPassInput" class="auth-input" placeholder="ПАРОЛЬ" autocomplete="current-password">
        <button type="button" class="pass-toggle" onclick="togglePass('loginPassInput', this)" tabindex="-1">
          <svg class="eye-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 9C1 9 3.5 3.5 9 3.5S17 9 17 9s-2.5 5.5-8 5.5S1 9 1 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.4"/>
            <line class="eye-slash" x1="2" y1="2" x2="16" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" style="display:none"/>
          </svg>
        </button>
      </div>
      <div class="pin-error" id="loginError"></div>
      <button type="button" class="auth-submit" id="loginSubmit">ВОЙТИ</button>
      <div class="forgot-link" onclick="switchView('forgot')">Забыли пароль?</div>
    </div>

    <!-- СОЗДАТЬ АККАУНТ -->
    <div class="auth-form" id="registerForm" style="display:none;">
      <input type="text" id="regLoginInput" class="auth-input" placeholder="ЛОГИН" autocomplete="username" maxlength="20">
      <div class="field-hint">3–20 симв., латиница/цифры/_, минимум 3 буквы</div>
      <input type="text" id="regEmailInput" class="auth-input" placeholder="ПОЧТА" autocomplete="email">
      <div class="pass-wrapper">
        <input type="password" id="regPassInput" class="auth-input" placeholder="ПАРОЛЬ" autocomplete="new-password">
        <button type="button" class="pass-toggle" onclick="togglePass('regPassInput', this)" tabindex="-1">
          <svg class="eye-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 9C1 9 3.5 3.5 9 3.5S17 9 17 9s-2.5 5.5-8 5.5S1 9 1 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.4"/>
            <line class="eye-slash" x1="2" y1="2" x2="16" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" style="display:none"/>
          </svg>
        </button>
      </div>
      <div class="pass-wrapper">
        <input type="password" id="regPass2Input" class="auth-input" placeholder="ПОВТОРИ ПАРОЛЬ" autocomplete="new-password">
        <button type="button" class="pass-toggle" onclick="togglePass('regPass2Input', this)" tabindex="-1">
          <svg class="eye-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 9C1 9 3.5 3.5 9 3.5S17 9 17 9s-2.5 5.5-8 5.5S1 9 1 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.4"/>
            <line class="eye-slash" x1="2" y1="2" x2="16" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" style="display:none"/>
          </svg>
        </button>
      </div>
      <div class="pin-error" id="regError"></div>
      <button type="button" class="auth-submit" id="regSubmit">СОЗДАТЬ АККАУНТ</button>
    </div>

    <!-- ЗАБЫЛИ ПАРОЛЬ -->
    <div class="auth-form" id="forgotForm" style="display:none;">
      <input type="text" id="forgotIdentInput" class="auth-input" placeholder="ЛОГИН ИЛИ ПОЧТА" autocomplete="username">
      <div class="pin-error" id="forgotError"></div>
      <div class="pin-success" id="forgotSuccess"></div>
      <button type="button" class="auth-submit" id="forgotSubmit">ОТПРАВИТЬ ССЫЛКУ</button>
      <div class="forgot-link" onclick="switchView('login')">← Назад ко входу</div>
    </div>

    <!-- НОВЫЙ ПАРОЛЬ (после перехода по ссылке из письма) -->
    <div class="auth-form" id="resetForm" style="display:none;">
      <div class="pass-wrapper">
        <input type="password" id="resetPassInput" class="auth-input" placeholder="НОВЫЙ ПАРОЛЬ" autocomplete="new-password">
        <button type="button" class="pass-toggle" onclick="togglePass('resetPassInput', this)" tabindex="-1">
          <svg class="eye-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 9C1 9 3.5 3.5 9 3.5S17 9 17 9s-2.5 5.5-8 5.5S1 9 1 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.4"/>
            <line class="eye-slash" x1="2" y1="2" x2="16" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" style="display:none"/>
          </svg>
        </button>
      </div>
      <div class="pass-wrapper">
        <input type="password" id="resetPass2Input" class="auth-input" placeholder="ПОВТОРИ ПАРОЛЬ" autocomplete="new-password">
        <button type="button" class="pass-toggle" onclick="togglePass('resetPass2Input', this)" tabindex="-1">
          <svg class="eye-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 9C1 9 3.5 3.5 9 3.5S17 9 17 9s-2.5 5.5-8 5.5S1 9 1 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.4"/>
            <line class="eye-slash" x1="2" y1="2" x2="16" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" style="display:none"/>
          </svg>
        </button>
      </div>
      <div class="pin-error" id="resetError"></div>
      <div class="pin-success" id="resetSuccess"></div>
      <button type="button" class="auth-submit" id="resetSubmit">СОХРАНИТЬ ПАРОЛЬ</button>
    </div>
  </div>
</div>

<script type="module">
  import {
    initializeApp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence,
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    sendPasswordResetEmail, verifyPasswordResetCode, confirmPasswordReset
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getDatabase, ref, get, set as dbSet, update as dbUpdate
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCMVd8slq6gc6lD1noTW0DDW8VkALJcZao",
    authDomain: "bonuspoint-lime.firebaseapp.com",
    databaseURL: "https://bonuspoint-lime-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "bonuspoint-lime",
    storageBucket: "bonuspoint-lime.firebasestorage.app",
    messagingSenderId: "647315774952",
    appId: "1:647315774952:web:b8269372e8abf5d97f185d"
  };

  const authApp = initializeApp(firebaseConfig, "authApp");
  const auth = getAuth(authApp);
  const db = getDatabase(authApp);

  // ── Куда отправлять после успешного входа ──
  const DEFAULT_REDIRECT = './';
  const params = new URLSearchParams(window.location.search);
  const redirectTo = params.get('redirect') || DEFAULT_REDIRECT;
  const mode = params.get('mode');
  const oobCode = params.get('oobCode');

  function goToApp() {
    window.location.replace(redirectTo);
  }

  // ── Ссылка возврата для писем восстановления пароля ──
  // Указываем адрес этой же страницы — тогда клик по ссылке из письма
  // вернёт пользователя сюда же с параметрами ?mode=resetPassword&oobCode=...
  const CONTINUE_URL = window.location.origin + window.location.pathname;

  // ── Ключ для email-индекса (RTDB не разрешает точки в ключах) ──
  function emailKey(email) {
    return email.trim().toLowerCase().replace(/[.#$\[\]]/g, (c) => (
      { '.': '_D_', '#': '_H_', '$': '_S_', '[': '_LB_', ']': '_RB_' }[c]
    ));
  }

  const loadingBox = document.getElementById('loadingBox');
  const authBox = document.getElementById('authBox');
  const authSubLabel = document.getElementById('authSubLabel');
  const tabSwitch = document.getElementById('tabSwitch');
  const tabBtnLogin = document.getElementById('tabBtnLogin');
  const tabBtnRegister = document.getElementById('tabBtnRegister');

  const views = {
    login: document.getElementById('loginForm'),
    register: document.getElementById('registerForm'),
    forgot: document.getElementById('forgotForm'),
    reset: document.getElementById('resetForm')
  };
  const subLabels = {
    login: 'ВХОД В СИСТЕМУ',
    register: 'РЕГИСТРАЦИЯ',
    forgot: 'ВОССТАНОВЛЕНИЕ ПАРОЛЯ',
    reset: 'НОВЫЙ ПАРОЛЬ'
  };

  // ── Показать/скрыть пароль ──
  window.togglePass = function(inputId, btn) {
    const input = document.getElementById(inputId);
    const slash = btn.querySelector('.eye-slash');
    if (input.type === 'password') {
      input.type = 'text';
      slash.style.display = '';
      btn.style.color = 'rgba(0,220,255,0.85)';
    } else {
      input.type = 'password';
      slash.style.display = 'none';
      btn.style.color = '';
    }
  };

  window.switchView = function(view) {
    Object.keys(views).forEach(k => views[k].style.display = (k === view ? 'flex' : 'none'));
    authSubLabel.textContent = subLabels[view];
    tabSwitch.style.display = (view === 'login' || view === 'register') ? 'flex' : 'none';
    tabBtnLogin.classList.toggle('active', view === 'login');
    tabBtnRegister.classList.toggle('active', view === 'register');
    clearAllErrors();
  };

  function clearAllErrors() {
    ['loginError','regError','forgotError','resetError'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '';
    });
    ['forgotSuccess','resetSuccess'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '';
    });
  }

  function shakeInputs(ids) {
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add('error');
      setTimeout(() => el.classList.remove('error'), 400);
    });
  }

  // ══════════════════════════════════════
  //  ВЕТКА 1: возврат по ссылке восстановления пароля
  // ══════════════════════════════════════
  if (mode === 'resetPassword' && oobCode) {
    loadingBox.style.display = 'none';
    authBox.style.display = 'flex';
    switchView('reset');

    const resetSubmit = document.getElementById('resetSubmit');
    const resetError = document.getElementById('resetError');
    const resetSuccess = document.getElementById('resetSuccess');

    verifyPasswordResetCode(auth, oobCode).catch(() => {
      resetError.textContent = '✕ ССЫЛКА НЕДЕЙСТВИТЕЛЬНА ИЛИ УСТАРЕЛА';
      resetSubmit.disabled = true;
    });

    resetSubmit.addEventListener('click', async () => {
      resetError.textContent = '';
      resetSuccess.textContent = '';
      const p1 = document.getElementById('resetPassInput').value;
      const p2 = document.getElementById('resetPass2Input').value;
      if (!p1 || !p2) {
        resetError.textContent = '✕ ЗАПОЛНИ ОБА ПОЛЯ';
        shakeInputs(['resetPassInput','resetPass2Input']);
        return;
      }
      if (p1.length < 6) {
        resetError.textContent = '✕ МИНИМУМ 6 СИМВОЛОВ';
        shakeInputs(['resetPassInput']);
        return;
      }
      if (p1 !== p2) {
        resetError.textContent = '✕ ПАРОЛИ НЕ СОВПАДАЮТ';
        shakeInputs(['resetPassInput','resetPass2Input']);
        return;
      }
      resetSubmit.disabled = true;
      try {
        await confirmPasswordReset(auth, oobCode, p1);
        resetSuccess.textContent = '✓ ПАРОЛЬ ИЗМЕНЁН, ПЕРЕХОД КО ВХОДУ...';
        setTimeout(() => { window.location.href = window.location.pathname; }, 1800);
      } catch (e) {
        resetError.textContent = '✕ ССЫЛКА НЕДЕЙСТВИТЕЛЬНА ИЛИ УСТАРЕЛА';
        resetSubmit.disabled = false;
      }
    });

    // Дальше в этой ветке ничего не выполняем
  } else {
    // ══════════════════════════════════════
    //  ВЕТКА 2: обычный вход / регистрация
    // ══════════════════════════════════════
    await setPersistence(auth, browserLocalPersistence);

    // Флаг: пока идёт регистрация (создание аккаунта + запись логина в базу),
    // общий слушатель ниже НЕ должен делать редирект сам по себе — иначе
    // он срабатывает сразу после createUserWithEmailAndPassword и уводит
    // со страницы раньше, чем успевает выполниться запись логина в базу.
    let isRegistering = false;

    let authResolved = false;
    const authFallbackTimer = setTimeout(() => {
      if (!authResolved) {
        loadingBox.style.display = 'none';
        authBox.style.display = 'flex';
      }
    }, 5000);

    onAuthStateChanged(auth, (user) => {
      authResolved = true;
      clearTimeout(authFallbackTimer);
      if (user) {
        if (!isRegistering) goToApp();
      } else {
        loadingBox.style.display = 'none';
        authBox.style.display = 'flex';
      }
    });

    // ── ВОЙТИ ──
    const loginIdentInput = document.getElementById('loginIdentInput');
    const loginPassInput = document.getElementById('loginPassInput');
    const loginError = document.getElementById('loginError');
    const loginSubmit = document.getElementById('loginSubmit');

    async function tryLogin() {
      loginError.textContent = '';
      const ident = loginIdentInput.value.trim();
      const pass = loginPassInput.value;
      if (!ident || !pass) {
        loginError.textContent = '✕ ЗАПОЛНИТЕ ВСЕ ПОЛЯ';
        shakeInputs(['loginIdentInput','loginPassInput']);
        return;
      }
      loginSubmit.disabled = true;
      let email = ident;
      try {
        if (!ident.includes('@')) {
          const snap = await get(ref(db, 'loginEmails/' + ident.toUpperCase()));
          if (!snap.exists()) {
            loginError.textContent = '✕ НЕВЕРНЫЙ ЛОГИН ИЛИ ПАРОЛЬ';
            shakeInputs(['loginIdentInput','loginPassInput']);
            loginSubmit.disabled = false;
            return;
          }
          email = snap.val();
        }
        await signInWithEmailAndPassword(auth, email, pass);
        // onAuthStateChanged сам сделает редирект
      } catch (e) {
        loginError.textContent = '✕ НЕВЕРНЫЙ ЛОГИН ИЛИ ПАРОЛЬ';
        shakeInputs(['loginIdentInput','loginPassInput']);
        loginSubmit.disabled = false;
      }
    }
    loginSubmit.addEventListener('click', tryLogin);
    [loginIdentInput, loginPassInput].forEach(el => {
      el.addEventListener('input', () => loginError.textContent = '');
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
    });

    // ── СОЗДАТЬ АККАУНТ ──
    const regLoginInput = document.getElementById('regLoginInput');
    const regEmailInput = document.getElementById('regEmailInput');
    const regPassInput = document.getElementById('regPassInput');
    const regPass2Input = document.getElementById('regPass2Input');
    const regError = document.getElementById('regError');
    const regSubmit = document.getElementById('regSubmit');

    async function tryRegister() {
      regError.textContent = '';
      const login = regLoginInput.value.trim();
      const email = regEmailInput.value.trim().toLowerCase();
      const pass = regPassInput.value;
      const pass2 = regPass2Input.value;

      if (!login || !email || !pass || !pass2) {
        regError.textContent = '✕ ЗАПОЛНИТЕ ВСЕ ПОЛЯ';
        return;
      }
      if (!/^[A-Za-z0-9_]{3,20}$/.test(login)) {
        regError.textContent = '✕ ЛОГИН: 3–20 СИМВ., ЛАТИНИЦА/ЦИФРЫ/_';
        shakeInputs(['regLoginInput']);
        return;
      }
      if ((login.match(/[A-Za-z]/g) || []).length < 3) {
        regError.textContent = '✕ МИНИМУМ 3 БУКВЫ В ЛОГИНЕ';
        shakeInputs(['regLoginInput']);
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        regError.textContent = '✕ НЕВЕРНЫЙ ФОРМАТ ПОЧТЫ';
        shakeInputs(['regEmailInput']);
        return;
      }
      if (pass.length < 6) {
        regError.textContent = '✕ ПАРОЛЬ: МИНИМУМ 6 СИМВОЛОВ';
        shakeInputs(['regPassInput']);
        return;
      }
      if (pass !== pass2) {
        regError.textContent = '✕ ПАРОЛИ НЕ СОВПАДАЮТ';
        shakeInputs(['regPassInput','regPass2Input']);
        return;
      }

      const loginKey = login.toUpperCase();
      const eKey = emailKey(email);

      regSubmit.disabled = true;
      regSubmit.textContent = '...';

      try {
        const [loginSnap, dispSnap, emailSnap] = await Promise.all([
          get(ref(db, 'loginNames/' + loginKey)),
          get(ref(db, 'displayNames/' + loginKey)),
          get(ref(db, 'emails/' + eKey))
        ]);
        if (loginSnap.exists() || dispSnap.exists()) {
          regError.textContent = '✕ ЭТОТ ЛОГИН УЖЕ ЗАНЯТ';
          shakeInputs(['regLoginInput']);
          regSubmit.disabled = false;
          regSubmit.textContent = 'СОЗДАТЬ АККАУНТ';
          return;
        }
        if (emailSnap.exists()) {
          regError.textContent = '✕ ЭТА ПОЧТА УЖЕ ИСПОЛЬЗУЕТСЯ';
          shakeInputs(['regEmailInput']);
          regSubmit.disabled = false;
          regSubmit.textContent = 'СОЗДАТЬ АККАУНТ';
          return;
        }
      } catch (e) {
        regError.textContent = '✕ ОШИБКА ПРОВЕРКИ, ПОПРОБУЙ ЕЩЁ РАЗ';
        regSubmit.disabled = false;
        regSubmit.textContent = 'СОЗДАТЬ АККАУНТ';
        return;
      }

      isRegistering = true;
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid = cred.user.uid;
        try {
          // ВАЖНО: правило записи в users/{uid}/login (при создании) и в
          // loginEmails/{login} обе требуют, чтобы root.child('loginNames/'+login)
          // УЖЕ равнялся auth.uid НА МОМЕНТ проверки правила. Если писать
          // loginNames одним multi-path update() вместе с путём, который на
          // неё ссылается через root.child(...), для совершенно нового логина
          // loginNames в эту секунду ещё не существует в БД с точки зрения
          // правила — оно не проходит гарантированно, не только в случае гонки.
          // Поэтому пишем строго ТРЕМЯ последовательными шагами:
          //   1) loginNames — отдельно, первым, ждём подтверждения сервера;
          //   2) users/login + users/email + emails — вторым update(),
          //      когда root уже точно видит loginNames;
          //   3) loginEmails — третьим, по той же причине.
          await dbSet(ref(db, 'loginNames/' + loginKey), uid);

          try {
            const step2 = {};
            step2['users/' + uid + '/login'] = login;
            step2['users/' + uid + '/email'] = email;
            step2['emails/' + eKey] = uid;
            await dbUpdate(ref(db), step2);

            try {
              await dbSet(ref(db, 'loginEmails/' + loginKey), email);
            } catch (step3Err) {
              try {
                const rollback = {};
                rollback['users/' + uid] = null;
                rollback['loginNames/' + loginKey] = null;
                rollback['emails/' + eKey] = null;
                await dbUpdate(ref(db), rollback);
              } catch (rbErr) {
                console.error('Не удалось откатить частичную запись после сбоя шага 3:', rbErr);
              }
              throw step3Err;
            }
          } catch (step2Err) {
            try {
              await dbSet(ref(db, 'loginNames/' + loginKey), null);
            } catch (rbErr) {
              console.error('Не удалось откатить loginNames после сбоя шага 2:', rbErr);
            }
            throw step2Err;
          }
        } catch (writeErr) {
          // Логин заняли за долю секунды раньше нас — аккаунт уже создан на новой почте,
          // но индекс логина занять не удалось.
          // ВАЖНО: обязательно откатываем созданный Auth-аккаунт, иначе он "осиротеет" —
          // останется в Firebase Auth без записи в базе, и почта окажется навсегда
          // заблокированной для повторной регистрации (auth/email-already-in-use),
          // а вход по логину работать не будет, т.к. loginNames/loginEmails не записались.
          isRegistering = false;
          try {
            await cred.user.delete();
          } catch (delErr) {
            console.error('Не удалось удалить осиротевший аккаунт после сбоя записи в БД:', delErr);
          }
          regError.textContent = '✕ ЛОГИН ТОЛЬКО ЧТО ЗАНЯЛИ, ВЫБЕРИ ДРУГОЙ';
          shakeInputs(['regLoginInput']);
          regSubmit.disabled = false;
          regSubmit.textContent = 'СОЗДАТЬ АККАУНТ';
          return;
        }
        // Запись логина в базу подтверждена — теперь можно безопасно
        // пускать общий onAuthStateChanged делать редиректы.
        isRegistering = false;
        goToApp();
      } catch (err) {
        isRegistering = false;
        if (err.code === 'auth/email-already-in-use') {
          regError.textContent = '✕ ЭТА ПОЧТА УЖЕ ИСПОЛЬЗУЕТСЯ';
        } else if (err.code === 'auth/invalid-email') {
          regError.textContent = '✕ НЕВЕРНЫЙ ФОРМАТ ПОЧТЫ';
        } else if (err.code === 'auth/weak-password') {
          regError.textContent = '✕ СЛИШКОМ ПРОСТОЙ ПАРОЛЬ';
        } else {
          regError.textContent = '✕ ОШИБКА: ' + err.code;
        }
        regSubmit.disabled = false;
        regSubmit.textContent = 'СОЗДАТЬ АККАУНТ';
      }
    }
    regSubmit.addEventListener('click', tryRegister);
    [regLoginInput, regEmailInput, regPassInput, regPass2Input].forEach(el => {
      el.addEventListener('input', () => regError.textContent = '');
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryRegister(); });
    });

    // ── ЗАБЫЛИ ПАРОЛЬ ──
    const forgotIdentInput = document.getElementById('forgotIdentInput');
    const forgotError = document.getElementById('forgotError');
    const forgotSuccess = document.getElementById('forgotSuccess');
    const forgotSubmit = document.getElementById('forgotSubmit');

    async function tryForgot() {
      forgotError.textContent = '';
      forgotSuccess.textContent = '';
      const ident = forgotIdentInput.value.trim();
      if (!ident) {
        forgotError.textContent = '✕ ВВЕДИ ЛОГИН ИЛИ ПОЧТУ';
        shakeInputs(['forgotIdentInput']);
        return;
      }
      forgotSubmit.disabled = true;
      let email = ident;
      try {
        if (!ident.includes('@')) {
          const snap = await get(ref(db, 'loginEmails/' + ident.toUpperCase()));
          if (snap.exists()) email = snap.val();
          else email = null;
        }
        if (email) {
          await sendPasswordResetEmail(auth, email, { url: CONTINUE_URL });
        }
      } catch (e) {
        // Намеренно не показываем, что аккаунт не найден — не палим базу пользователей
      }
      forgotSuccess.textContent = '✓ ЕСЛИ АККАУНТ НАЙДЕН — ССЫЛКА ОТПРАВЛЕНА НА ПОЧТУ';
      forgotSubmit.disabled = false;
    }
    forgotSubmit.addEventListener('click', tryForgot);
    forgotIdentInput.addEventListener('input', () => { forgotError.textContent = ''; forgotSuccess.textContent = ''; });
    forgotIdentInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryForgot(); });
  }
</script>
</body>
</html>
